<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雨夜心跳 · 文字冒险</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="brand">
        <h1 class="title">雨夜心跳 · 文字冒险</h1>
        <p class="sub">在暧昧和勇气之间，做出你的选择。</p>
      </div>
      <div class="header-actions">
        <button id="backlog-btn" class="mini-btn" type="button">回看记录</button>
        <button id="fast-btn" class="mini-btn" type="button">快进：关</button>
        <button id="skip-btn" class="mini-btn" type="button">跳过已读：关</button>
      </div>
    </header>

    <section class="layout">
      <aside class="panel">
        <section>
          <h2>关系状态</h2>
          <div id="stats-root"></div>
        </section>

        <section class="panel-block">
          <h3>最近选择</h3>
          <div class="history-box" id="history-box">你还没有做出选择。</div>
        </section>

        <section class="panel-block">
          <h3>结局图鉴</h3>
          <div id="gallery-root" class="gallery-list"></div>
        </section>

        <section class="panel-block">
          <h3>音频与演出</h3>
          <div class="toggle-grid">
            <button id="bgm-toggle" class="mini-btn" type="button">BGM：开</button>
            <button id="sfx-toggle" class="mini-btn" type="button">音效：开</button>
          </div>
        </section>
      </aside>

      <article class="story" id="story-root"></article>
    </section>

    <footer class="foot">
      键盘：方向键切换，Enter / Space确认，F快进，S跳过已读，B回看记录。
    </footer>
  </main>

  <dialog id="backlog-dialog" class="backlog-dialog">
    <header class="dialog-head">
      <h2>剧情回看</h2>
      <button id="close-backlog-btn" class="mini-btn" type="button">关闭</button>
    </header>
    <div id="backlog-list" class="backlog-list"></div>
  </dialog>

  <script type="module" src="./ui.js"></script>
</body>
</html>
