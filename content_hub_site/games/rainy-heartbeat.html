          <p>
            《雨夜心跳》是一个剧情分支实验。玩家每次选择都会改变关系温度和后续对白，目标是让“选择”真正有情绪后果。
          </p>

          <h2>玩法设定</h2>
          <ul>
            <li>每章 3-5 个关键选择</li>
            <li>情绪值影响结局走向</li>
            <li>支持快速回看路径</li>
          </ul>

          <h2>迭代重点</h2>
          <ul>
            <li>优化对白节奏，减少“解释型台词”</li>
            <li>给关键节点增加视觉变化</li>
            <li>完善存档和回放体验</li>
          </ul>
