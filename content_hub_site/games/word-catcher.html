          <h1>词语捕手</h1>
        </header>

        <div class="content">
          <p>
            《词语捕手》把语文学习做成了快节奏小游戏。玩家需要在限时内组合词组、判断语义，兼顾手速和语感。
          </p>

          <h2>核心玩法</h2>
          <ul>
            <li>60 秒内完成尽可能多的词组匹配</li>
            <li>连击会触发加分与视觉反馈</li>
            <li>错误选择会扣时间，鼓励“快但准”</li>
          </ul>

          <h2>设计方向</h2>
          <p>
            游戏想做成“有学习价值但不说教”的体验，适合内容创作者和学生群体快速体验与分享。
          </p>
